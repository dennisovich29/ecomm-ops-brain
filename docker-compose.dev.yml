# Development override for hot-reload
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - REPO_BACKEND=mock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    command: sh -c "cd /app && pnpm dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
